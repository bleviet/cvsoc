# genimage.cfg — SD card image layout for DE10-Nano Cyclone V SoC
#
# Partition layout:
#   1. Raw area (type 0xA2) at 1 MiB offset — U-Boot SPL (preloader)
#   2. FAT32 partition — U-Boot, kernel zImage, DTB, FPGA .rbf
#   3. ext4 partition — Linux root filesystem
#
# The Cyclone V BootROM scans the MBR for a type-0xA2 partition and reads
# the preloader (U-Boot SPL) from there.  U-Boot then loads zImage + DTB
# from the FAT32 partition, and Linux mounts the ext4 rootfs.

image boot.vfat {
    vfat {
        files = {
            "zImage",
            "socfpga_cyclone5_de0_nano_soc.dtb",
            "u-boot.img",
            "fpga_led_overlay.dtbo",
            "de10_nano.rbf",
            "extlinux/extlinux.conf"
        }
    }

    size = 64M
}

image sdcard.img {
    hdimage {
    }

    # Partition 1: U-Boot SPL (raw, type 0xA2 for Cyclone V BootROM)
    partition u-boot-spl {
        partition-type = 0xa2
        image = "u-boot-with-spl.sfp"
        offset = 1M
    }

    # Partition 2: FAT32 boot partition (kernel, DTB, U-Boot, overlay)
    partition boot {
        partition-type = 0xc
        bootable = "true"
        image = "boot.vfat"
    }

    # Partition 3: ext4 root filesystem
    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
