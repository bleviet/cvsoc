# OpenOCD configuration for DE10-Nano HPS (Cyclone V SoC, Cortex-A9).
#
# Connects via USB-Blaster II.  The firmware path is set to the one bundled
# inside the raetro/quartus Docker container.  When running standalone on the
# host, override with: openocd -f de10_nano_hps.cfg
#   -c "set BLASTER_FW /mnt/c/intelFPGA_lite/23.1std/qprogrammer/bin64/blaster_6810.hex"
#
# Usage via Makefile (Docker):
#   make download-elf
#
# Usage standalone (WSL2 host, needs udev rule for USB access):
#   openocd -f scripts/de10_nano_hps.cfg

# ── Interface: aji_client ─────────────────────────────────────────────────────
# Intel's Quartus-bundled OpenOCD uses aji_client (talks to jtagd daemon).
# Start jtagd before invoking openocd (see Makefile download-elf target).
interface aji_client

adapter speed 1000

# ── Cyclone V SoC JTAG chain ──────────────────────────────────────────────────
# Device @1: HPS ARM DAP  (irlen 4)
# Device @2: Cyclone V FPGA TAP (irlen 10)
jtag newtap fpgasoc cpu -irlen 4 -ircapture 0x01 -irmask 0x0f \
    -expected-id 0x4ba00477
jtag newtap fpgasoc.fpga tap -irlen 10 -ircapture 0x01 -irmask 0x3 \
    -expected-id 0x02d020dd

# ── Cortex-A9 core 0 ─────────────────────────────────────────────────────────
dap create fpgasoc.dap -chain-position fpgasoc.cpu
target create fpgasoc.cpu.0 cortex_a -dap fpgasoc.dap \
    -coreid 0 -dbgbase 0x80110000

fpgasoc.cpu.0 configure -event reset-assert-post {
    cortex_a dbginit
}

# GDB server on default port 3333
gdb_port 3333
telnet_port 4444
tcl_port 6666
