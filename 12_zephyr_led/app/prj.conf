# prj.conf — Kconfig for Phase 8 Zephyr LED demo
#
# Minimal configuration for a multi-threaded application that:
#   - Outputs to UART console
#   - Uses GPIO for push-button interrupts
#   - Controls FPGA LEDs via memory-mapped IO (sys_write32)

# ── Console / logging ────────────────────────────────────────────────────────
CONFIG_UART_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# ── Threading ────────────────────────────────────────────────────────────────
CONFIG_MULTITHREADING=y
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024
CONFIG_THREAD_NAME=y

# ── GPIO (for push-button interrupts) ────────────────────────────────────────
CONFIG_GPIO=y

# ── Memory-mapped IO ─────────────────────────────────────────────────────────
# sys_write32 / sys_read32 are built-in — no extra Kconfig needed.
# The FPGA LED PIO at 0xFF200000 is accessed directly as bare MMIO.

# ── Timing ───────────────────────────────────────────────────────────────────
CONFIG_TIMING_FUNCTIONS=n
